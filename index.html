  <style>
    :root {
      --bg: #faf7f2;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #8b2252;
      --accent-light: #f3e8ee;
      --gold: #c4962c;
      --border: #e8e4de;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 3rem 1.5rem 1rem;
      max-width: 600px;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }

    header p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.5;
      font-style: italic;
    }

    .generator {
      width: 100%;
      max-width: 480px;
      padding: 0 1.5rem;
      margin-top: 2rem;
    }

    .book-cover {
      background: linear-gradient(135deg, #2c1810 0%, #4a2028 40%, #1a0a14 100%);
      border-radius: 4px;
      padding: 3rem 2.5rem;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      box-shadow:
        6px 6px 0 rgba(0,0,0,0.15),
        0 20px 60px rgba(0,0,0,0.2);
      cursor: default;
      transition: transform 0.3s ease;
      overflow: hidden;
    }

    .book-cover::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, rgba(0,0,0,0.3), transparent);
    }

    .book-cover::after {
      content: '';
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(196, 150, 44, 0.3);
      border-radius: 2px;
      pointer-events: none;
    }

    .book-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #f5f0e8;
      line-height: 1.25;
      margin-bottom: 1.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      max-width: 90%;
      transition: opacity 0.3s ease;
    }

    .book-author {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.9;
    }

    .book-subtitle {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 0.85rem;
      font-style: italic;
      color: rgba(245, 240, 232, 0.6);
      margin-top: 1rem;
    }

    .sticker {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(12deg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .sticker span {
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #1a0a14;
      text-align: center;
      line-height: 1.2;
    }

    .formula-tag {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      font-style: italic;
      min-height: 1.4em;
    }

    .formula-tag strong {
      color: var(--accent);
      font-style: normal;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
      justify-content: center;
    }

    .btn-generate {
      padding: 0.9rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-generate:hover {
      background: #a02a65;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139, 34, 82, 0.3);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .btn-share {
      padding: 0.9rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: var(--card);
      color: var(--muted);
      transition: all 0.2s;
    }

    .btn-share:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .counter {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .counter strong {
      color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      margin-top: auto;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeTitle {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .title-animate {
      animation: fadeTitle 0.4s ease forwards;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.8rem; }
      .book-cover { padding: 2.5rem 1.75rem; min-height: 280px; }
      .book-title { font-size: 1.5rem; }
      .controls { flex-direction: column; }
      .btn-generate, .btn-share { width: 100%; }
    }
  </style>
</head>

  <header>
    <h1>The Bestseller Title Generator</h1>

    <div class="counter" id="counter"></div>

  <footer>
    <p>A silly project by <a href="https://chalkstream.digital" target="_blank">Chalkstream Digital</a></p>

    formula: 'The [Adjective] Life of [Name]',
    realBooks: 'The Secret Life of Bees, The Immortal Life of Henrietta Lacks, The Invisible Life of Addie LaRue',
    generate: () => `The ${pick(['Secret', 'Invisible', 'Extraordinary', 'Remarkable', 'Impossible', 'Curious', 'Unexpected', 'Improbable'])} Life of ${pick(firstNames)} ${pick(authorLastNames)}`
  }
];

// ── Helpers ──────────────────────────────────────────────────────

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

let generatedCount = 0;
let lastTitle = '';

function generate() {
  const pattern = pick(patterns);
  let title;
  // Avoid repeating the same title
  do {
    title = pattern.generate();
  } while (title === lastTitle);
  lastTitle = title;

  const titleEl = document.getElementById('book-title');
  const authorEl = document.getElementById('book-author');
  const subtitleEl = document.getElementById('book-subtitle');
  const formulaEl = document.getElementById('formula-tag');
  const coverEl = document.getElementById('book-cover');
  const stickerEl = coverEl.querySelector('.sticker span');

  // Animate
  titleEl.classList.remove('title-animate');
  void titleEl.offsetWidth;
  titleEl.classList.add('title-animate');

  // Set content
  titleEl.textContent = title;
  authorEl.textContent = `${pick(authorFirstNames)} ${pick(authorLastNames)}`;
  subtitleEl.textContent = pick(subtitles);
  formulaEl.innerHTML = `Formula: <strong>${pattern.name}</strong> &mdash; ${pattern.formula}`;

  // Random cover colour
  const palette = pick(coverPalettes);
  coverEl.style.background = `linear-gradient(135deg, ${palette[0]} 0%, ${palette[1]} 40%, ${palette[2]} 100%)`;

  // Random sticker
  stickerEl.innerHTML = pick(stickers).replace(/\n/g, '<br>');

  // Counter
  generatedCount++;
  const counterEl = document.getElementById('counter');
  if (generatedCount === 1) {
    counterEl.textContent = 'Your first potential bestseller!';
  } else {
    counterEl.innerHTML = `<strong>${generatedCount}</strong> titles generated. Surely one of them is a bestseller.`;
  }
}

function share() {
  const title = document.getElementById('book-title').textContent;
  const author = document.getElementById('book-author').textContent;
  if (!title || title === 'Click Generate to discover your bestseller') {
    generate();
    return;
  }

  const text = `My next bestseller: "${title}" by ${author}\n\nGenerated at`;
  const url = window.location.href;

  if (navigator.share) {
    navigator.share({ title: 'The Bestseller Title Generator', text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(`${text} ${url}`).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
}

// ── Init ────────────────────────────────────────────────────────

document.getElementById('btn-generate').addEventListener('click', generate);
document.getElementById('btn-share').addEventListener('click', share);

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    generate();
  }
});
</script>
